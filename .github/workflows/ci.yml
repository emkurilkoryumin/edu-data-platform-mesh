name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall src tests airflow/dags scripts

      - name: Run unit tests
        run: pytest -q

      - name: Run data quality checks
        run: python scripts/run_quality_checks.py

      - name: Upload quality report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: raw-quality-report
          path: metadata/quality/raw_quality_report.json
          if-no-files-found: ignore

  webapp:
    name: Webapp checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build webapp
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  docker-build:
    name: Docker build checks
    runs-on: ubuntu-latest
    needs:
      - python
      - webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Airflow image
        run: docker build -t edu-gallery-airflow:ci -f docker/airflow/Dockerfile .

      - name: Build Cube image
        run: docker build -t edu-gallery-cube:ci -f cube/Dockerfile cube
