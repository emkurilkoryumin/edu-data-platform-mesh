stages:
  - validate
  - test
  - data_quality
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: "/certs"

cache:
  paths:
    - .cache/pip

python:compile:
  stage: validate
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - pip install -e .
    - python -m compileall src tests airflow/dags

pytest:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - pip install -e .
    - pytest -q

great_expectations:raw:
  stage: data_quality
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - pip install -e .
    - python scripts/run_quality_checks.py
  artifacts:
    when: always
    paths:
      - metadata/quality/

docker:build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/airflow:$CI_COMMIT_SHORT_SHA" -f docker/airflow/Dockerfile .
    - docker build -t "$CI_REGISTRY_IMAGE/cube:$CI_COMMIT_SHORT_SHA" -f cube/Dockerfile cube
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker push "$CI_REGISTRY_IMAGE/airflow:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/cube:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH'

deploy:stage:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval "$(ssh-agent -s)"
    - echo "$STAGE_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan "$STAGE_HOST" >> ~/.ssh/known_hosts
  script:
    - ./scripts/deploy_staging.sh
  environment:
    name: stage
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
